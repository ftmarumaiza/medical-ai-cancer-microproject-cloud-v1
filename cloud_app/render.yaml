services:
  - type: web
    name: medical-ai-cloud
    env: python
    plan: free
    buildCommand: pip install -r requirements-cloud.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: STORAGE_MODE
        value: local
      - key: DEVICE
        value: cpu
      - key: MODEL_PATH
        value: ../yolov8n.pt
